# OutLayer worker — deployed as a dstack CVM on a self-hosted TDX node.
#
# - image is pinned BY DIGEST (verifiable, Sigstore-attested release build) so the
#   app-compose hash (measured into RTMR3) is deterministic. 40-deploy-worker.sh
#   rewrites this digest for the chosen --version from the GitHub release.
# - secrets are NOT here: env VALUES come via `vmm-cli ... --env-file worker.env`
#   (encrypted by the per-node KMS + embedded as a ciphertext blob). The compose text
#   keeps only ${VAR} references, so plaintext secrets never enter the measured compose;
#   dstack decrypts the env inside the CVM and docker-compose substitutes at runtime.
# - the worker is outbound-only (polls the coordinator); no inbound ports.
# - /var/run/dstack.sock is provided by dstack inside the CVM (TDX quotes).
# - mirrors docker/docker-compose.phala.yml (single worker service, no compiler sidecar
#   since COMPILATION_ENABLED=false; no docker.sock — execution is in-process wasmedge).

services:
  worker:
    image: docker.io/outlayer/near-outlayer-worker@sha256:REPLACE_WITH_RELEASE_DIGEST
    restart: on-failure:5
    environment:
      API_BASE_URL: ${API_BASE_URL}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
      NEAR_RPC_URL: ${NEAR_RPC_URL}
      OFFCHAINVM_CONTRACT_ID: ${OFFCHAINVM_CONTRACT_ID}
      OPERATOR_ACCOUNT_ID: ${OPERATOR_ACCOUNT_ID}
      # In TEE mode the operator key is generated at registration; only set for legacy mode.
      OPERATOR_PRIVATE_KEY: ${OPERATOR_PRIVATE_KEY:-}
      TEE_MODE: ${TEE_MODE}
      USE_TEE_REGISTRATION: ${USE_TEE_REGISTRATION}
      COMPILATION_ENABLED: ${COMPILATION_ENABLED}
      COMPILATION_MODE: ${COMPILATION_MODE:-native}
      EXECUTION_ENABLED: ${EXECUTION_ENABLED}
      # Init account pays gas for worker registration when USE_TEE_REGISTRATION=true.
      INIT_ACCOUNT_ID: ${INIT_ACCOUNT_ID:-}
      INIT_ACCOUNT_PRIVATE_KEY: ${INIT_ACCOUNT_PRIVATE_KEY:-}
      KEYSTORE_BASE_URL: ${KEYSTORE_BASE_URL:-}
      KEYSTORE_AUTH_TOKEN: ${KEYSTORE_AUTH_TOKEN:-}
      RUST_LOG: ${RUST_LOG:-info}
      SAVE_SYSTEM_HIDDEN_LOGS_TO_DEBUG: ${SAVE_SYSTEM_HIDDEN_LOGS_TO_DEBUG:-false}
      PRINT_WASM_STDERR: ${PRINT_WASM_STDERR:-false}
      ENABLE_EVENT_MONITOR: ${ENABLE_EVENT_MONITOR:-false}
      NEARDATA_API_URL: ${NEARDATA_API_URL:-}
      FASTNEAR_API_URL: ${FASTNEAR_API_URL:-}
      START_BLOCK_HEIGHT: ${START_BLOCK_HEIGHT:-0}
      WASM_CACHE_MAX_SIZE_MB: ${WASM_CACHE_MAX_SIZE_MB:-}
      POLL_TIMEOUT_SECONDS: 30
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
